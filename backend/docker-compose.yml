version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: xyz_postgres
    restart: always

    env_file:
      - .env.docker

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: xyz_backend

    depends_on:
      - postgres

    env_file:
      - .env.docker

    ports:
      - "3000:3000"

volumes:
  postgres_data: